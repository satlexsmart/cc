<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | SATLEX COMMUNITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <div class="inline-block bg-emerald-100 text-emerald-700 text-[10px] font-black px-3 py-1 rounded-full mb-3 uppercase tracking-widest">Private Access</div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight leading-none">SATLEX COMMUNITY</h1>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Identity</label>
                <input id="my-name" type="text" placeholder="Enter your name" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-medium text-slate-800">
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Avatar (URL)</label>
                <input id="my-photo" type="text" placeholder="Paste image link (optional)" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-sm text-slate-600">
            </div>

            <button onclick="joinRoom()" class="w-full bg-slate-900 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl mt-4 shadow-xl transition-all active:scale-95 flex justify-center items-center gap-2">
                <span>Enter Room</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </div>
        
        <p class="text-center text-[10px] text-gray-400 mt-6 font-medium">By entering, you agree to the community guidelines.</p>
    </div>

    <script>
        function joinRoom() {
            const name = document.getElementById('my-name').value.trim();
            const photo = document.getElementById('my-photo').value.trim();

            if (!name) {
                alert("Please enter a name to join.");
                return;
            }

            let url = `room.html?name=${encodeURIComponent(name)}`;
            if (photo) url += `&photo=${encodeURIComponent(photo)}`;
            
            window.location.href = url;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>
</html>
