<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm rounded-3xl shadow-xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Start Chatting</h1>
            <p class="text-sm text-gray-500 mt-1">Enter details to connect</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Your Name</label>
                <input id="my-name" type="text" placeholder="e.g. Satvik" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Partner's Name</label>
                <input id="partner-name" type="text" placeholder="e.g. John" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
            </div>

            <button onclick="startChat()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl mt-4 shadow-md transition-all active:scale-95">
                Join Chat
            </button>
        </div>
    </div>

    <script>
        function startChat() {
            const me = document.getElementById('my-name').value.trim();
            const to = document.getElementById('partner-name').value.trim();

            if (!me || !to) {
                alert("Please enter both names.");
                return;
            }

            window.location.href = `chat.html?me=${encodeURIComponent(me)}&to=${encodeURIComponent(to)}`;
        }
    </script>
</body>
</html>
