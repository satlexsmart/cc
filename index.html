<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | SATLEX COMMUNITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm rounded-3xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">SATLEX COMMUNITY</h1>
            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">( Private )</p>
        </div>

        <div class="space-y-4">
            <input id="my-name" type="text" placeholder="Your Name" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-slate-800 outline-none transition-all font-medium text-slate-800">
            
            <input id="my-photo" type="text" placeholder="Profile Photo URL (Optional)" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-slate-800 outline-none transition-all text-sm text-slate-600">

            <button onclick="joinRoom()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl mt-4 shadow-lg transition-all active:scale-95">
                Enter Room
            </button>
        </div>
    </div>

    <script>
        function joinRoom() {
            const name = document.getElementById('my-name').value.trim();
            const photo = document.getElementById('my-photo').value.trim();

            if (!name) return;

            let url = `room.html?name=${encodeURIComponent(name)}`;
            if (photo) url += `&photo=${encodeURIComponent(photo)}`;
            
            window.location.href = url;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>
</html>
