<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SATLEX COMMUNITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
    </style>
</head>
<body class="bg-slate-200 dark:bg-slate-950 h-screen flex justify-center sm:py-4 transition-colors">

    <div class="w-full sm:max-w-md bg-white dark:bg-slate-900 sm:rounded-3xl shadow-2xl flex flex-col h-full overflow-hidden border dark:border-slate-800">
        
        <div class="bg-slate-900 dark:bg-black text-white px-4 py-3 flex justify-between items-center z-20 shadow-lg">
            <div class="flex items-center gap-3">
                <div class="h-8 w-8 bg-emerald-500 rounded-lg flex items-center justify-center font-black text-white text-xs">S</div>
                <div>
                    <h2 class="font-bold text-sm tracking-wide">SATLEX COMMUNITY</h2>
                    <p class="text-[9px] text-emerald-400 font-black uppercase tracking-widest">Encrypted Room</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="flushChat()" class="text-red-400 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button>
                <button onclick="toggleTheme()" class="text-gray-300 hover:text-white transition w-8 h-8 rounded-full bg-slate-800 flex justify-center items-center">
                    <i id="theme-icon" class="fa-solid fa-moon text-xs"></i>
                </button>
            </div>
        </div>

        <div class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 z-10">
            <div id="online-users" class="flex gap-4 overflow-x-auto no-scrollbar px-4 py-3"></div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar flex flex-col chat-bg bg-slate-100 dark:bg-slate-900">
            <div id="messages-container" class="space-y-4"></div>
            <div id="typing-indicator" class="hidden text-[10px] text-gray-500 font-bold ml-2 animate-pulse italic">Someone is typing...</div>
        </div>

        <div class="bg-white dark:bg-black px-3 py-4 border-t dark:border-slate-800 flex items-end gap-2">
            <div class="flex-1 bg-slate-100 dark:bg-slate-800 rounded-2xl flex items-center px-4 py-1 border border-transparent focus-within:border-emerald-500 transition-all">
                <textarea id="msg-input" rows="1" placeholder="Type here..." class="w-full bg-transparent py-2 text-sm outline-none resize-none no-scrollbar dark:text-white"></textarea>
            </div>
            <button onclick="sendMessage()" class="bg-emerald-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg hover:bg-emerald-500 active:scale-90 transition-all">
                <i class="fa-solid fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        const firebaseConfig = {
            apiKey: "AIzaSyCnwh0cRGZCbjPNTKXtE6xDuBQkx0p5e3g",
            authDomain: "juicer-cf8fc.firebaseapp.com",
            projectId: "juicer-cf8fc",
            storageBucket: "juicer-cf8fc.firebasestorage.app",
            messagingSenderId: "169880056817",
            appId: "1:169880056817:web:28f95611dfc0d5b02c4a50"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_USER = urlParams.get('name') || "Guest";
        const PHOTO = urlParams.get('photo') || `https://ui-avatars.com/api/?name=${CURRENT_USER}&background=random`;

        const userRef = db.collection("community_users").doc(CURRENT_USER);
        
        const setOnline = () => userRef.set({ online: true, photo: PHOTO, lastSeen: Date.now() }, { merge: true });
        const setOffline = () => userRef.set({ online: false }, { merge: true });

        setOnline();
        window.addEventListener('beforeunload', setOffline);
        window.addEventListener('pagehide', setOffline);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') setOnline();
            else setOffline();
        });

        async function askAI(prompt) {
            if (!prompt || prompt.trim() === "") {
                db.collection("community_messages").add({
                    sender: "🤖 SATLEX AI",
                    text: "You need to ask a question! (e.g., 'ai answer what is HTML?')",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    isAI: true
                });
                return;
            }

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${GROQ_API_KEY}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }]
                    })
                });
                
                if (!res.ok) {
                    const errorData = await res.json();
                    console.error("GROQ_ERROR_DETAILS:", errorData);
                    throw new Error("Bad Request");
                }
                
                const data = await res.json();
                const reply = data.choices[0].message.content;
                
                db.collection("community_messages").add({
                    sender: "🤖 SATLEX AI",
                    text: reply,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    isAI: true
                });
            } catch (e) {
                db.collection("community_messages").add({
                    sender: "🤖 SATLEX AI",
                    text: "Connection Error. Check the F12 Console for GROQ_ERROR_DETAILS.",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    isAI: true
                });
            }
        }

        async function flushChat() {
            if (!confirm("Are you sure you want to clear all messages?")) return;
            const snapshot = await db.collection("community_messages").get();
            const batch = db.batch();
            snapshot.docs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';
            db.collection("community_system").doc("typing").set({ [CURRENT_USER]: false }, { merge: true });

            await db.collection("community_messages").add({
                sender: CURRENT_USER,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            if (text.toLowerCase().startsWith("ai answer")) {
                const prompt = text.replace(/ai answer/i, "").trim();
                askAI(prompt);
            }
        }

        db.collection("community_messages").orderBy("timestamp", "asc").onSnapshot(snap => {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.sender === CURRENT_USER;
                const isAI = d.isAI;
                
                container.innerHTML += `
                    <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[85%] ${isMe ? 'bg-emerald-600 text-white rounded-2xl rounded-tr-none' : isAI ? 'bg-blue-600 text-white rounded-2xl rounded-tl-none' : 'bg-white dark:bg-slate-800 dark:text-white rounded-2xl rounded-tl-none'} p-3 shadow-sm">
                            <p class="text-[10px] font-black opacity-70 mb-1 uppercase">${d.sender}</p>
                            <p class="text-sm leading-relaxed">${d.text}</p>
                        </div>
                    </div>`;
            });
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        });

        db.collection("community_users").where("online", "==", true).onSnapshot(snap => {
            const cont = document.getElementById('online-users');
            cont.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `<img src="${d.photo}" class="w-8 h-8 rounded-full border-2 border-emerald-500 p-0.5" title="${doc.id}">`;
            });
        });

        db.collection("community_system").doc("typing").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                const isAnyoneElseTyping = Object.keys(data).some(key => key !== CURRENT_USER && data[key] === true);
                const indicator = document.getElementById('typing-indicator');
                if (isAnyoneElseTyping) {
                    indicator.classList.remove('hidden');
                    const win = document.getElementById('chat-window');
                    win.scrollTop = win.scrollHeight;
                } else {
                    indicator.classList.add('hidden');
                }
            }
        });

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        const msgInput = document.getElementById('msg-input');
        let typingTimeout;
        
        msgInput.addEventListener('input', () => {
            msgInput.style.height = 'auto';
            msgInput.style.height = msgInput.scrollHeight + 'px';
            
            db.collection("community_system").doc("typing").set({ [CURRENT_USER]: true }, { merge: true });
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                db.collection("community_system").doc("typing").set({ [CURRENT_USER]: false }, { merge: true });
            }, 1500);
        });

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
