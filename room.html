<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SATLEX COMMUNITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-200 dark:bg-slate-950 h-screen flex justify-center sm:py-4 transition-colors duration-300">

    <div class="w-full sm:max-w-md bg-white dark:bg-slate-900 sm:rounded-3xl shadow-2xl flex flex-col h-full overflow-hidden relative border dark:border-slate-800 transition-colors duration-300">
        
        <div class="bg-slate-900 dark:bg-slate-950 text-white px-4 py-3 flex justify-between items-center z-20 shadow-md">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='index.html'" class="text-gray-300 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div>
                    <h2 class="font-bold text-sm tracking-wide">SATLEX COMMUNITY</h2>
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">( Private )</p>
                </div>
            </div>
            <button onclick="toggleTheme()" class="text-gray-300 hover:text-white transition w-8 h-8 flex justify-center items-center rounded-full bg-slate-800 dark:bg-slate-800">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
        </div>

        <div class="bg-slate-50 dark:bg-slate-800/50 border-b border-gray-100 dark:border-slate-800 z-10">
            <div class="text-[10px] text-gray-400 dark:text-gray-500 font-bold uppercase px-4 pt-2">Online Now</div>
            <div id="online-users" class="flex gap-4 overflow-x-auto no-scrollbar px-4 py-3">
            </div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar flex flex-col relative bg-[#efeae2] dark:bg-slate-900 transition-colors duration-300">
            <div id="messages-container" class="space-y-2 flex-1"></div>
            
            <div id="typing-indicator" class="hidden flex justify-start w-full mt-2">
                <div class="bg-white dark:bg-slate-800 text-slate-800 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm border border-gray-100 dark:border-slate-700 flex gap-1 items-center">
                    <div class="w-1.5 h-1.5 bg-gray-400 dark:bg-gray-500 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-400 dark:bg-gray-500 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-400 dark:bg-gray-500 rounded-full typing-dot"></div>
                </div>
            </div>
        </div>

        <div class="bg-slate-100 dark:bg-slate-950 px-2 py-3 border-t border-gray-200 dark:border-slate-800 flex items-end gap-2 z-10 transition-colors duration-300">
            <div class="flex-1 bg-white dark:bg-slate-800 rounded-2xl flex items-center border border-gray-300 dark:border-slate-700 focus-within:border-slate-500 dark:focus-within:border-slate-500 transition-all">
                <textarea id="msg-input" rows="1" placeholder="Message community..." class="w-full bg-transparent px-4 py-3 text-sm outline-none resize-none max-h-32 no-scrollbar dark:text-white"></textarea>
            </div>
            <button onclick="sendMessage()" class="bg-emerald-600 text-white w-12 h-12 rounded-full flex justify-center items-center shadow-md hover:bg-emerald-700 active:scale-95 transition-all flex-shrink-0">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnwh0cRGZCbjPNTKXtE6xDuBQkx0p5e3g",
            authDomain: "juicer-cf8fc.firebaseapp.com",
            projectId: "juicer-cf8fc",
            storageBucket: "juicer-cf8fc.firebasestorage.app",
            messagingSenderId: "169880056817",
            appId: "1:169880056817:web:28f95611dfc0d5b02c4a50"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_USER = urlParams.get('name');
        const USER_PHOTO = urlParams.get('photo') || `https://ui-avatars.com/api/?name=${encodeURIComponent(CURRENT_USER)}&background=0D8ABC&color=fff&bold=true`;

        if (!CURRENT_USER) window.location.href = 'index.html';

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const userRef = db.collection("community_users").doc(CURRENT_USER);
        userRef.set({
            online: true,
            photo: USER_PHOTO,
            lastActive: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        window.addEventListener('beforeunload', () => {
            userRef.set({ online: false }, { merge: true });
        });

        let isDark = false;
        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.classList.toggle('dark', isDark);
            const icon = document.getElementById('theme-icon');
            if (isDark) {
                icon.classList.replace('fa-moon', 'fa-sun');
                icon.classList.add('text-yellow-400');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                icon.classList.remove('text-yellow-400');
            }
        }

        const msgContainer = document.getElementById('messages-container');
        const inputField = document.getElementById('msg-input');
        const typingIndicator = document.getElementById('typing-indicator');
        const onlineContainer = document.getElementById('online-users');

        db.collection("community_users").where("online", "==", true).onSnapshot((snap) => {
            onlineContainer.innerHTML = '';
            snap.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                onlineContainer.innerHTML += `
                    <div class="flex flex-col items-center min-w-[50px] animate-fade-in">
                        <div class="relative">
                            <img src="${data.photo}" class="w-10 h-10 rounded-full border-2 border-slate-200 dark:border-slate-700 object-cover bg-white">
                            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white dark:border-slate-900 shadow-sm"></div>
                        </div>
                        <span class="text-[10px] mt-1.5 text-slate-600 dark:text-slate-400 font-semibold truncate w-14 text-center">${id === CURRENT_USER ? 'You' : id}</span>
                    </div>
                `;
            });
        });

        db.collection("community_messages").orderBy("timestamp", "asc").onSnapshot((snap) => {
            msgContainer.innerHTML = '';
            snap.forEach((doc) => {
                const data = doc.data();
                const isMe = data.sender === CURRENT_USER;
                const timeStr = data.timestamp ? data.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                
                msgContainer.innerHTML += `
                    <div class="flex ${isMe ? 'justify-end' : 'justify-start'} w-full mt-2">
                        <div class="max-w-[80%] flex flex-col">
                            ${!isMe ? `<span class="text-[10px] text-gray-500 dark:text-gray-400 ml-1 mb-1 font-semibold">${data.sender}</span>` : ''}
                            <div class="px-4 py-2 shadow-sm ${isMe ? 'bg-emerald-600 text-white rounded-2xl rounded-tr-sm' : 'bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 rounded-2xl rounded-tl-sm border border-gray-100 dark:border-slate-700'}">
                                <p class="text-[15px] leading-relaxed break-words">${data.text}</p>
                                <div class="flex justify-end items-center mt-1">
                                    <span class="text-[10px] ${isMe ? 'text-emerald-200' : 'text-gray-400'} font-medium">${timeStr}</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('chat-window').scrollTo({ top: document.getElementById('chat-window').scrollHeight });
        });

        db.collection("community_system").doc("typing").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                const isAnyoneElseTyping = Object.keys(data).some(key => key !== CURRENT_USER && data[key] === true);
                
                if (isAnyoneElseTyping) {
                    typingIndicator.classList.remove('hidden');
                    document.getElementById('chat-window').scrollTo({ top: document.getElementById('chat-window').scrollHeight });
                } else {
                    typingIndicator.classList.add('hidden');
                }
            }
        });

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;
            
            inputField.value = '';
            inputField.style.height = 'auto';
            
            db.collection("community_system").doc("typing").set({ [CURRENT_USER]: false }, { merge: true });
            
            await db.collection("community_messages").add({
                sender: CURRENT_USER,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        let typingTimeout;
        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';

            db.collection("community_system").doc("typing").set({ [CURRENT_USER]: true }, { merge: true });
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                db.collection("community_system").doc("typing").set({ [CURRENT_USER]: false }, { merge: true });
            }, 1500);
        });

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
