<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .chat-bg { background-color: #efeae2; }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-200 h-screen flex justify-center sm:py-4">

    <div class="w-full sm:max-w-md bg-white sm:rounded-3xl shadow-2xl flex flex-col h-full overflow-hidden relative">
        
        <div class="bg-slate-900 text-white px-4 py-3 flex justify-between items-center z-10 shadow-md">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='index.html'" class="text-gray-300 hover:text-white transition"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="relative">
                    <img id="partner-avatar" src="" class="w-10 h-10 rounded-full border-2 border-slate-700">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-slate-900"></div>
                </div>
                <div>
                    <h2 id="chat-title" class="font-semibold text-sm">Loading...</h2>
                    <p id="status-text" class="text-xs text-green-400 font-medium">Online</p>
                </div>
            </div>
        </div>

        <div id="chat-window" class="flex-1 chat-bg overflow-y-auto p-4 space-y-4 no-scrollbar flex flex-col relative">
            <div id="messages-container" class="space-y-4 flex-1"></div>
            
            <div id="typing-indicator" class="hidden flex justify-start w-full mt-2">
                <div class="bg-white text-slate-800 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm border border-gray-100 flex gap-1 items-center">
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                </div>
            </div>
        </div>

        <div class="bg-slate-100 px-2 py-3 border-t border-gray-200 flex items-end gap-2 z-10">
            <div class="flex-1 bg-white rounded-2xl flex items-center border border-gray-300 focus-within:border-slate-500 transition-all">
                <textarea id="msg-input" rows="1" placeholder="Type a message..." class="w-full bg-transparent px-4 py-3 text-sm outline-none resize-none max-h-32 no-scrollbar"></textarea>
            </div>
            <button onclick="sendMessage()" class="bg-emerald-600 text-white w-12 h-12 rounded-full flex justify-center items-center shadow-md hover:bg-emerald-700 active:scale-95 transition-all">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnwh0cRGZCbjPNTKXtE6xDuBQkx0p5e3g",
            authDomain: "juicer-cf8fc.firebaseapp.com",
            projectId: "juicer-cf8fc",
            storageBucket: "juicer-cf8fc.firebasestorage.app",
            messagingSenderId: "169880056817",
            appId: "1:169880056817:web:28f95611dfc0d5b02c4a50"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Parse URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const CURRENT_USER = urlParams.get('me');
        const PARTNER_USER = urlParams.get('to');

        if (!CURRENT_USER || !PARTNER_USER) {
            window.location.href = 'index.html';
        }

        // Generate consistent Room ID regardless of who joined first
        const roomArray = [CURRENT_USER.toLowerCase(), PARTNER_USER.toLowerCase()].sort();
        const CHAT_ROOM_ID = `room_${roomArray[0]}_${roomArray[1]}`;

        // Set UI Data dynamically
        document.getElementById('chat-title').innerText = PARTNER_USER;
        document.getElementById('partner-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(PARTNER_USER)}&background=0D8ABC&color=fff&bold=true`;

        const msgContainer = document.getElementById('messages-container');
        const inputField = document.getElementById('msg-input');
        const typingIndicator = document.getElementById('typing-indicator');
        const statusText = document.getElementById('status-text');

        function formatTime(timestamp) {
            if (!timestamp) return '';
            return timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        db.collection("messages")
            .where("room", "==", CHAT_ROOM_ID)
            .orderBy("timestamp", "asc")
            .onSnapshot((snapshot) => {
                msgContainer.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.sender === CURRENT_USER;
                    
                    if (!isMe && !data.seen) {
                        doc.ref.update({ seen: true });
                    }

                    const statusIcon = isMe 
                        ? (data.seen ? '<i class="fa-solid fa-check-double text-blue-500 ml-1"></i>' 
                                     : '<i class="fa-solid fa-check text-gray-400 ml-1"></i>') : '';

                    const msgDiv = document.createElement('div');
                    msgDiv.className = `flex ${isMe ? 'justify-end' : 'justify-start'} w-full mb-4`;
                    msgDiv.innerHTML = `
                        <div class="max-w-[80%] flex flex-col">
                            <div class="px-4 py-2 shadow-sm ${isMe ? 'bg-emerald-100 text-slate-800 rounded-2xl rounded-tr-sm' : 'bg-white text-slate-800 rounded-2xl rounded-tl-sm border border-gray-100'}">
                                <p class="text-[15px] leading-relaxed break-words">${data.text}</p>
                                <div class="flex justify-end items-center gap-1 mt-1">
                                    <span class="text-[10px] text-gray-400 font-medium">${formatTime(data.timestamp)}</span>
                                    ${statusIcon}
                                </div>
                            </div>
                        </div>`;
                    msgContainer.appendChild(msgDiv);
                });
                document.getElementById('chat-window').scrollTo({ top: document.getElementById('chat-window').scrollHeight });
            });

        db.collection("chats").doc(CHAT_ROOM_ID).onSnapshot((doc) => {
            if (doc.exists) {
                if (doc.data()[`${PARTNER_USER}_typing`]) {
                    typingIndicator.classList.remove('hidden');
                    statusText.innerText = "typing...";
                    statusText.classList.replace('text-green-400', 'text-emerald-500');
                    document.getElementById('chat-window').scrollTo({ top: document.getElementById('chat-window').scrollHeight });
                } else {
                    typingIndicator.classList.add('hidden');
                    statusText.innerText = "Online";
                    statusText.classList.replace('text-emerald-500', 'text-green-400');
                }
            }
        });

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;
            inputField.value = '';
            
            db.collection("chats").doc(CHAT_ROOM_ID).set({ [`${CURRENT_USER}_typing`]: false }, { merge: true });
            await db.collection("messages").add({
                room: CHAT_ROOM_ID, sender: CURRENT_USER, receiver: PARTNER_USER, text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(), seen: false 
            });
        }

        let typingTimeout;
        inputField.addEventListener('input', () => {
            db.collection("chats").doc(CHAT_ROOM_ID).set({ [`${CURRENT_USER}_typing`]: true }, { merge: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                db.collection("chats").doc(CHAT_ROOM_ID).set({ [`${CURRENT_USER}_typing`]: false }, { merge: true });
            }, 1500);
        });

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
    </script>
</body>
</html>
